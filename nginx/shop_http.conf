# HTTP — serverdə /var/www/lesson (və ya öz yolunuz) ilə uyğunlaşdırın.
# Nümunə:
#   sudo cp shop_http.conf /etc/nginx/sites-available/shop
#   sudo ln -sf /etc/nginx/sites-available/shop /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Backend (port 325):
#   cd /var/www/lesson/backend && . .venv/bin/activate
#   python manage.py migrate --noinput && python manage.py collectstatic --noinput
#   gunicorn config.wsgi:application --bind 127.0.0.1:325 --workers 3

server {
    listen 324;
    listen [::]:324;
    server_name 178.104.92.41;

    client_max_body_size 25m;

    # Bu yolları öz server strukturunuza görə dəyişin
    root /var/www/lesson/frontend/dist;

    location /static/ {
        alias /var/www/lesson/backend/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:325;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:325;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
